# =============================================================================
# .github/workflows/docker-publish.yml
# =============================================================================
# Builds and pushes phille06/mythic-framework-docker to Docker Hub.
#
# Triggers:
#   - Push to main/master branch       → publishes :latest tag
#   - Git tag  vX.Y.Z                  → publishes :vX.Y.Z + :latest
#   - Pull request against main/master → build only, no push (smoke test)
#   - Manual via Actions tab           → "Run workflow" button
#
# Required GitHub Secrets (Settings → Secrets → Actions):
#   DOCKERHUB_USERNAME   your Docker Hub username  (phille06)
#   DOCKERHUB_TOKEN      Docker Hub access token
#                        (Hub → Account Settings → Security → New Access Token)
# =============================================================================

name: Build & Push to Docker Hub

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:   # manual trigger from the Actions tab

env:
  IMAGE_NAME: phille06/mythic-framework-docker

jobs:
  build-and-push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ── 1. Checkout source ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up QEMU (for multi-platform builds — linux/amd64 + arm64) ──
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # ── 3. Set up Docker Buildx ───────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 4. Log in to Docker Hub (skip on PRs) ─────────────────────────────
      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 5. Extract metadata (tags + labels) ───────────────────────────────
      # Tag logic:
      #   push to main/master  → :latest
      #   push tag v1.2.3      → :v1.2.3  AND  :latest
      #   pull request         → build only, not pushed
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            # :latest on default branch
            type=raw,value=latest,enable={{is_default_branch}}
            # semver tags: v1.2.3 → 1.2.3, 1.2, 1
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # short SHA for traceability
            type=sha,prefix=sha-,format=short
          labels: |
            org.opencontainers.image.title=mythic-framework-docker
            org.opencontainers.image.description=FXServer + txAdmin + Mythic Framework — fully automated headless deployment
            org.opencontainers.image.vendor=Phille06
            credits=FiveM Docker originally by ich777 (admin@minenet.at) https://github.com/ich777/docker-fivem-server — forked by Phille06

      # ── 6. Build and push ─────────────────────────────────────────────────
      - name: Build and push Docker image
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # Build for both amd64 (standard servers) and arm64 (Raspberry Pi / ARM VPS)
          platforms: linux/amd64,linux/arm64
          # Only push on non-PR events
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GitHub Actions cache for faster rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── 7. Print image digest ─────────────────────────────────────────────
      - name: Image digest
        if: github.event_name != 'pull_request'
        run: echo "Published ${{ env.IMAGE_NAME }} — digest ${{ steps.build-and-push.outputs.digest }}"

      # ── 8. Update Docker Hub description from README.md ───────────────────
      - name: Update Docker Hub description
        if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.IMAGE_NAME }}
          readme-filepath: ./README.md
          short-description: "FXServer + txAdmin + Mythic Framework — automated headless Docker deployment"
